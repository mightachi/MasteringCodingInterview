# Example Kubernetes Deployment and Service for the ensemble model API
# Apply: kubectl apply -f k8s/deployment.yaml
# Adjust namespace, image, and resources for your cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ensemble-model-api
  labels:
    app: ensemble-model-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ensemble-model-api
  template:
    metadata:
      labels:
        app: ensemble-model-api
    spec:
      containers:
        - name: server
          image: your-registry/ensemble-model:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            # Optional: override model path if loading from volume or different artifact
            # - name: MODEL_PATH
            #   value: "/models/ensemble_pipeline/1.0.0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ensemble-model-service
spec:
  selector:
    app: ensemble-model-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
